name: redis-live

on:
  workflow_dispatch:

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    env:
      STORAGE_DRIVER: redis
      REDIS_URL: ${{ secrets.REDIS_URL }}
      RUN_REDIS_LIVE_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate REDIS_URL
        run: |
          if [ -z "$REDIS_URL" ]; then
            echo "REDIS_URL secret is required."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run live Redis smoke test
        run: npm run test:redis-live
